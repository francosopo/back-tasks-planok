version: "3.9"

services:
  db:
    image: postgres:latest
    container_name: postgres_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tasks_bd
    ports:
      - "15432:5432"
  backend:
    image: api-task:latest
    command: sh -c "sleep 15 && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"

    depends_on:
      - db
    environment:
      - DB_HOST=localhost
      - DB_PORT=5432
      - DB_NAME=tasks_bd
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - OPENAI_API_KEY=langchainapikey
